name: Crawl Mastercard content

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Crawl public Mastercard sources
        run: node scripts/crawl-mastercard.mjs

      - name: Commit crawl results
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data.js data.js crawl-report.json
            git commit -m "Update crawled content"
            git push
          else
            echo "No crawl changes"
          fi
